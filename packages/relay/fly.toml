app = "pascal-relay-deonmenezes"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 8080
  force_https = true
  # Single machine — y-websocket relay holds doc state in memory; multiple
  # instances would each have their own copy, breaking sync. For higher
  # capacity, swap to a Redis-backed setup or sticky-session routing.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
  concurrency = { type = "connections", soft_limit = 500, hard_limit = 1000 }

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
